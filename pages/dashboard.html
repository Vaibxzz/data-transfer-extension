<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>

  <!-- flatpickr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:#f6f7fb; color:#111; min-height:100vh}
    .header{background:#fff;border-bottom:1px solid #eef2f6;padding:10px 18px}
    .nav-container{display:flex;align-items:center;gap:12px;max-width:1200px;margin:0 auto;width:100%}
    /* removed big logo/title per request */
    .spacer { flex: 1 1 auto; }

    .profile-wrapper{position:relative;margin-left:8px;display:flex;align-items:center}
    .user-avatar{width:36px;height:36px;border-radius:50%;background:#7c3aed;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;cursor:pointer}
    .profile-menu{position:absolute;right:0;top:46px;min-width:220px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.07);padding:12px;z-index:1200;display:none}
    .profile-menu.show{display:block}
    .profile-card{display:flex;gap:12px;align-items:center;margin-bottom:10px}
    .profile-avatar{width:44px;height:44px;border-radius:50%;background:#eef2ff;display:flex;align-items:center;justify-content:center;color:#7c3aed;font-weight:700}
    .profile-meta{font-size:13px;color:#111827}
    .profile-meta .name{font-weight:600}
    .profile-meta .email{font-size:12px;color:#6b7280}
    .btn-logout{padding:8px 10px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer}

    .main-content{padding:22px;max-width:1200px;margin:18px auto}
    .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:20px}
    .date-picker{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer}
    .dropdown{position:relative}
    .dropdown-button{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer}
    .dropdown-menu{position:absolute;top:calc(100% + 8px);left:0;min-width:220px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 10px 18px rgba(0,0,0,.06);z-index:1000;max-height:220px;overflow-y:auto;display:none}
    .dropdown-menu.show{display:block}
    .dropdown-item{display:flex;align-items:center;padding:8px 12px;font-size:14px;color:#374151;border-bottom:1px solid #f3f4f6}

    .download-btn{margin-left:auto;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;background:#fff;display:flex;align-items:center;gap:8px;cursor:pointer}

    /* LARGER stat cards per your screenshot */
    .stats-container{display:flex;gap:18px;margin-bottom:18px;flex-wrap:wrap}
    .stat-card{background:#fff;padding:26px;border-radius:14px;min-width:220px;border:1px solid #eee;cursor:pointer;transition:transform .12s,box-shadow .12s;display:flex;flex-direction:column;align-items:flex-start;gap:6px}
    .stat-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(16,24,40,.06)}
    .stat-card.active{outline:2px solid rgba(124,58,237,.10)}
    .stat-number{font-size:48px;font-weight:700;color:#111}
    .stat-label{font-size:14px;font-weight:600;color:#6b7280;padding-top:6px}
    .stat-card.processed .stat-number { color: #10b981; }
    .stat-card.rejected .stat-number { color: #ef4444; }

    .table-container{background:#fff;border:1px solid #eaeff2;border-radius:10px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead th{padding:14px 18px;background:#fafbfc;font-weight:700;color:#374151;border-bottom:1px solid #eef2f6;text-align:left;cursor:pointer;position:relative}
    tbody td{padding:14px 18px;border-bottom:1px solid #f6f8fa;color:#374151}
    .empty-state{padding:40px 20px;text-align:center;color:#9ca3af}
    .column-search-container{display:none;position:absolute;top:100%;left:6px;right:6px;background:#fff;border:1px solid #e5e7eb;padding:8px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .column-search-container.active{display:block}
    th.search-active{background:#7c3aed !important;color:#fff}

    .sort-indicator { display:inline-block; margin-left:8px; font-size:13px; opacity:0.9; vertical-align:middle; }
    .col-title { display:inline-flex; align-items:center; gap:8px; font-weight:700; }
    .search-icon { width:16px; height:16px; display:inline-block; vertical-align:middle; opacity:0.9; }
    .col-text { display:inline-block; vertical-align:middle; }

    @media (max-width:800px) {
      .stat-number { font-size:34px; }
      .stats-container{gap:12px}
      .download-btn{margin-left:0}
    }

    /* subtle top pill area like your screenshot */
    .top-controls { display:flex; gap:12px; align-items:center; margin-bottom:18px; }
    .date-picker span, .dropdown-button span { color:#374151; font-size:14px; }

  </style>
</head>
<body>
  <div class="header">
    <div class="nav-container">
      <!-- removed big logo and main title per your request -->
      <div class="spacer"></div>

      <div class="profile-wrapper" id="profile-wrapper">
        <div class="user-avatar" id="user-avatar" title="Profile">V</div>
        <div class="profile-menu" id="profile-menu" aria-hidden="true">
          <div class="profile-card">
            <div class="profile-avatar" id="profile-avatar">V</div>
            <div class="profile-meta">
              <div class="name" id="profile-name">Guest</div>
              <div class="email" id="profile-email">Not signed in</div>
            </div>
          </div>
          <div class="profile-actions">
            <button class="btn-logout" id="btn-logout">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="top-controls">
      <div class="date-picker" id="date-picker" title="Choose date range">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
        <span id="date-range">01-10-2022 - 31-10-2022</span>
        <input type="text" id="date-input" style="display:none" />
      </div>

      <div class="dropdown">
        <button class="dropdown-button" id="dropdown-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.6"><path d="M3 5h18M5 7v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7"/></svg>
          <span id="selected-category">Pharmacy</span>
        </button>
        <div class="dropdown-menu" id="dropdown-menu">
          <div class="dropdown-item"><input type="checkbox" id="pharmacy" checked /><label for="pharmacy" style="margin-left:8px">Pharmacy</label></div>
          <div class="dropdown-item"><input type="checkbox" id="pharmacy1" /><label for="pharmacy1" style="margin-left:8px">Pharmacy 1</label></div>
          <div class="dropdown-item"><input type="checkbox" id="pharmacy2" /><label for="pharmacy2" style="margin-left:8px">Pharmacy 2</label></div>
        </div>
      </div>

      <button class="download-btn" id="download-btn" title="Export CSV">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="1.6"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span style="font-size:13px;color:#374151">Export</span>
      </button>
    </div>

    <div class="stats-container">
      <div class="stat-card total" id="stat-total">
        <div class="stat-number" id="total-entries">0</div>
        <div class="stat-label">Total Entries</div>
      </div>
      <div class="stat-card processed" id="stat-processed">
        <div class="stat-number" id="processed-entries">0</div>
        <div class="stat-label">Processed</div>
      </div>
      <div class="stat-card rejected" id="stat-rejected">
        <div class="stat-number" id="rejected-entries">0</div>
        <div class="stat-label">Rejected</div>
      </div>
    </div>

    <div class="table-container" id="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-column="firstName">
              <span class="col-title">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.6"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span class="col-text">First Name</span>
              </span>
              <span class="sort-indicator" data-col="firstName">⇅</span>
              <div class="column-search-container"><input type="text" class="column-search" placeholder="Search first name..." /></div>
            </th>

            <th data-column="lastName">
              <span class="col-title">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.6"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span class="col-text">Last Name</span>
              </span>
              <span class="sort-indicator" data-col="lastName">⇅</span>
              <div class="column-search-container"><input type="text" class="column-search" placeholder="Search last name..." /></div>
            </th>

            <th data-column="country">
              <span class="col-title">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.6"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span class="col-text">Country</span>
              </span>
              <span class="sort-indicator" data-col="country">⇅</span>
              <div class="column-search-container"><input type="text" class="column-search" placeholder="Search country..." /></div>
            </th>

            <th data-column="processTime">
              <span class="col-title">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.6"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span class="col-text">Process Time</span>
              </span>
              <span class="sort-indicator" data-col="processTime">⇅</span>
              <div class="column-search-container"><input type="text" class="column-search" placeholder="Search process time..." /></div>
            </th>
          </tr>
        </thead>
        <tbody id="entries-table-body"></tbody>
      </table>
      <div id="empty-state" class="empty-state"><div>No entries found</div></div>
    </div>
  </div>

  <!-- firebase libs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script src="dashboard.js" defer></script>
</body>
</html>
