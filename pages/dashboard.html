<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KOSH Data Transfer Dashboard</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Ubuntu,sans-serif;background:#f8f9fa;color:#333;min-height:100vh}
    .header{background:#fff;border-bottom:1px solid #e9ecef;padding:16px 24px}
    .nav-container{display:flex;align-items:center;gap:16px;max-width:1400px;margin:0 auto}
    .logo{width:40px;height:40px;background:linear-gradient(45deg,#ff6b35,#f7931e);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
    .profile-wrapper{position:relative;margin-left:auto;display:flex;align-items:center}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:#7c3aed;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;cursor:pointer}
    .profile-menu{position:absolute;right:0;top:44px;min-width:220px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 12px 30px rgba(0,0,0,.08);padding:12px;z-index:1200;display:none}
    .profile-menu.show{display:block}
    .profile-card{display:flex;gap:12px;align-items:center;margin-bottom:10px}
    .profile-avatar{width:44px;height:44px;border-radius:50%;background:#eef2ff;display:flex;align-items:center;justify-content:center;color:#7c3aed;font-weight:700}
    .profile-meta{font-size:13px;color:#111827}
    .profile-meta .name{font-weight:600}
    .profile-meta .email{font-size:12px;color:#6b7280}
    .btn-logout{padding:8px 10px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer}
    .main-content{padding:24px;max-width:1400px;margin:0 auto}
    .filters-row{display:flex;align-items:center;gap:16px;margin-bottom:32px}
    .date-picker{display:flex;align-items:center;gap:8px;padding:8px 16px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer}
    .dropdown{position:relative}
    .dropdown-button{display:flex;align-items:center;gap:8px;padding:8px 16px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer}
    .dropdown-menu{position:absolute;top:100%;left:0;min-width:200px;background:#fff;border:1px solid #e5e7eb;border-radius:6px;box-shadow:0 10px 15px rgba(0,0,0,.1);z-index:1000;max-height:200px;overflow-y:auto;display:none}
    .dropdown-menu.show{display:block}
    .dropdown-item{display:flex;align-items:center;padding:8px 12px;font-size:14px;color:#374151;border-bottom:1px solid #f3f4f6}
    .download-btn{margin-left:auto;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;background:#fff;display:flex;align-items:center;gap:8px;cursor:pointer}
    .stats-container{display:flex;gap:24px;margin-bottom:32px}
    .stat-card{background:#fff;padding:24px;border-radius:12px;min-width:160px;border:1px solid #e5e7eb;cursor:pointer;transition:transform .12s,box-shadow .12s}
    .stat-card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,.06)}
    .stat-card.active{outline:2px solid rgba(124,58,237,.14);box-shadow:0 10px 30px rgba(124,58,237,.06)}
    .stat-number{font-size:48px;font-weight:300;margin-bottom:8px}
    .stat-label{font-size:14px;font-weight:600;padding:6px 12px;border-radius:20px}
    /* Colors per request */
    .stat-card.total .stat-number { color: #374151; } /* dark grey */
    .stat-card.processed .stat-number { color: #10b981; } /* green */
    .stat-card.rejected .stat-number { color: #ef4444; } /* red */

    .table-container{background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{padding:16px 20px;background:#f9fafb;font-weight:600;color:#374151;border-bottom:1px solid #e5e7eb;text-align:left;cursor:pointer;position:relative}
    td{padding:16px 20px;border-bottom:1px solid #f3f4f6;color:#6b7280}
    .empty-state{padding:60px 20px;text-align:center;color:#9ca3af;display:none}
    .column-search-container{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e5e7eb;padding:8px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .column-search-container.active{display:block}
    th.search-active{background:#7c3aed !important;color:#fff}
    /* sort emoji styling */
    .sort-indicator { display:inline-block; margin-left:8px; font-size:14px; opacity:0.85; vertical-align:middle; }
    .col-title { display:inline-flex; align-items:center; gap:8px; font-weight:700; }
    /* new search SVG styling */
    .search-icon { width:16px; height:16px; display:inline-block; vertical-align:middle; opacity:0.9; }
    .col-text { display:inline-block; vertical-align:middle; }
  </style>
</head>
<body>
  <div class="header">
    <div class="nav-container">
      <div class="logo">GD</div>
      <div class="profile-wrapper" id="profile-wrapper">
        <div class="user-avatar" id="user-avatar">S</div>
        <div class="profile-menu" id="profile-menu" aria-hidden="true">
          <div class="profile-card">
            <div class="profile-avatar" id="profile-avatar">S</div>
            <div class="profile-meta">
              <div class="name" id="profile-name">Guest</div>
              <div class="email" id="profile-email">Not signed in</div>
            </div>
          </div>
          <div class="profile-actions">
            <button class="btn-logout" id="btn-logout">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="filters-row">
      <div class="date-picker" id="date-picker">
        <span>📅</span>
        <span id="date-range">01-10-2022 - 31-10-2022</span>
        <input type="text" id="date-input" style="display:none" />
      </div>

      <div class="dropdown">
        <button class="dropdown-button" id="dropdown-toggle">
          <span id="selected-category">Pharmacy</span>
          <span>▼</span>
        </button>
        <div class="dropdown-menu" id="dropdown-menu">
          <div class="dropdown-item"><input type="checkbox" id="pharmacy" checked /><label for="pharmacy">Pharmacy</label></div>
          <div class="dropdown-item"><input type="checkbox" id="pharmacy1" /><label for="pharmacy1">Pharmacy 1</label></div>
          <div class="dropdown-item"><input type="checkbox" id="pharmacy2" /><label for="pharmacy2">Pharmacy 2</label></div>
        </div>
      </div>

      <button class="download-btn" id="download-btn" title="Export CSV">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        <span style="font-size:13px;color:#374151">Export</span>
      </button>
    </div>

    <div class="stats-container">
      <div class="stat-card total" id="stat-total">
        <div class="stat-number" id="total-entries">0</div>
        <div class="stat-label">Total Entries</div>
      </div>
      <div class="stat-card processed" id="stat-processed">
        <div class="stat-number" id="processed-entries">0</div>
        <div class="stat-label">Processed</div>
      </div>
      <div class="stat-card rejected" id="stat-rejected">
        <div class="stat-number" id="rejected-entries">0</div>
        <div class="stat-label">Rejected</div>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th data-column="firstName">
              <span class="col-title">
                <!-- modern inline SVG search icon -->
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <circle cx="11" cy="11" r="6"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <span class="col-text">First Name</span>
              </span>
              <span class="sort-indicator" data-col="firstName">↕️</span>
              <div class="column-search-container"><input type="text" class="column-search" placeholder="Search first name..." /></div>
            </th>

            <th data-column="lastName">
              <span class="col-title">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <circle cx="11" cy="11" r="6"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <span class="col-text">Last Name</span>
              </span>
              <span class="sort-indicator" data-col="lastName">↕️</span>
              <div class="column-search-container"><input type="text" class="column-search" placeholder="Search last name..." /></div>
            </th>

            <th data-column="country">
              <span class="col-title">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <circle cx="11" cy="11" r="6"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <span class="col-text">Country</span>
              </span>
              <span class="sort-indicator" data-col="country">↕️</span>
              <div class="column-search-container"><input type="text" class="column-search" placeholder="Search country..." /></div>
            </th>

            <th data-column="processTime">
              <span class="col-title">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                  <circle cx="11" cy="11" r="6"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <span class="col-text">Process Time</span>
              </span>
              <span class="sort-indicator" data-col="processTime">↕️</span>
              <div class="column-search-container"><input type="text" class="column-search" placeholder="Search process time..." /></div>
            </th>
          </tr>
        </thead>
        <tbody id="entries-table-body"></tbody>
      </table>
      <div id="empty-state" class="empty-state"><div>No entries found</div></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

      if (!firebase.apps.length) {

  </script>

  <script src="dashboard.js" defer></script>
</body>
</html>
